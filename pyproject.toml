[tool.poetry]
name = "repi"
version = "0.1.0"
description = "Codebase Impact Engine"
authors = ["Varun Singh <varun7singh10@gmail.com>"]
readme = "README.md"
packages = [
    {include = "extractor"},
    {include = "graph"},
    {include = "utils"},
    {include = "diff"},
    {include = "analysis"}
]

[tool.poetry.dependencies]
python = "^3.11"
typer = "^0.15.0"
tree-sitter = ">=0.25.2"
tree-sitter-typescript = ">=0.23.2"
tree-sitter-javascript = ">=0.23.1"
networkx = "^3.4.0"
kuzu = "^0.8.0"
rich = "^13.9.0"
pathspec = "^0.12.1"
tree-sitter-python = "^0.25.0"
gitpython = "^3.1.46"
unidiff = "^0.7.5"
numpy = "^2.4.4"
scipy = "^1.17.1"

[tool.poetry.scripts]
repi = "cli:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
