services:
  db:
    image: pgvector/pgvector:pg16
    container_name: repi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lograg
      POSTGRES_USER: lograg_user
      POSTGRES_PASSWORD: password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lograg_user -d lograg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repi-redis
    # No host port published — only the app container talks to redis via
    # compose-internal DNS. Avoids clashing with a redis already running on
    # the host (common on dev boxes).

  # repi app — FastAPI backend (:8000) + Next.js UI (:3000) in one container.
  # The UI proxies `/api/*` to the colocated API, so the browser only needs
  # port 3000 to be reachable. Starts by default with `docker compose up`.
  #
  # All app configuration lives in /app/.repi/config.json (mounted from the
  # `repi_config` named volume below). The entrypoint seeds a docker-aware
  # default config on first start; subsequent edits via the UI's /config page
  # persist across `docker compose down` (lost only on `down -v`).
  app:
    image: ${REPI_IMAGE:-ghcr.io/varungitgood/repi:latest}
    build: .
    container_name: repi-app
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - repi_config:/app/.repi
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  repi_config:
