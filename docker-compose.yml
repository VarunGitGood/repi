services:
  db:
    image: pgvector/pgvector:pg16
    container_name: repi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lograg
      POSTGRES_USER: lograg_user
      POSTGRES_PASSWORD: password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lograg_user -d lograg"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: repi-api
    command: poetry run uvicorn repi.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    container_name: repi-worker
    command: poetry run python -m repi.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /var/log:/var/log:ro

volumes:
  postgres_data:
