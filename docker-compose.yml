services:
  db:
    image: pgvector/pgvector:pg16
    container_name: repi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lograg
      POSTGRES_USER: lograg_user
      POSTGRES_PASSWORD: password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lograg_user -d lograg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repi-redis
    ports:
      - "6379:6379"

  # repi API — opt in via `docker compose --profile all-in-one up`.
  # Pulls the published image by default; build: . is a local fallback for
  # users on a branch the workflow hasn't published yet.
  api:
    image: ${REPI_IMAGE:-ghcr.io/varungitgood/repi:latest}
    build: .
    container_name: repi-api
    profiles: ["all-in-one"]
    command: uvicorn repi.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://lograg_user:password_here@db:5432/lograg
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
