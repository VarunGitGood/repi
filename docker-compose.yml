services:
  db:
    image: pgvector/pgvector:pg16
    container_name: repi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lograg
      POSTGRES_USER: lograg_user
      POSTGRES_PASSWORD: password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lograg_user -d lograg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repi-redis
    ports:
      - "6379:6379"

